name: Push postmark templates action
description: Reusable push postmark templates

inputs:
  postmark-server-token:
    description: 'Postmark Server Token'
    required: true
    type: string

runs:
  using: 'composite'
  steps:
    - name: Install Postmark CLI
      shell: bash
      # figlet@1.11.1 (transitive dep via yargonaut) ships a broken CJS bundle;
      # pin the last good version until fixed upstream
      run: |
        npm install -g postmark-cli
        npm install --prefix "$(npm root -g)/postmark-cli" figlet@1.11.0 --no-save
    - name: Push templates to Postmark
      shell: bash
      run: yarn postmark:push:templates
      env:
        POSTMARK_SERVER_TOKEN: ${{ inputs.postmark-server-token }}
