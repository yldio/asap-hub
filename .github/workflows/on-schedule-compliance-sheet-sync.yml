name: Monthly Compliance Sheet Sync
on:
  schedule:
    - cron: '0 8 1 * *' # At 08:00 UTC, first day of the month.
  workflow_dispatch:

jobs:
  sync-compliance-sheet:
    uses: ./.github/workflows/reusable-compliance-sheet-sync.yml
    secrets:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      CRN_CONTENTFUL_ACCESS_TOKEN: ${{ secrets.CRN_CONTENTFUL_ACCESS_TOKEN }}
      CONTENTFUL_MANAGEMENT_TOKEN: ${{ secrets.CONTENTFUL_MANAGEMENT_TOKEN }}
