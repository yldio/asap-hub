name: Reusable Compliance Sheet Sync

on:
  workflow_call:
    secrets:
      AWS_ACCESS_KEY_ID:
        description: 'AWS Access Key ID'
        required: true
      AWS_SECRET_ACCESS_KEY:
        description: 'AWS Secret Access Key'
        required: true
      CRN_CONTENTFUL_ACCESS_TOKEN:
        description: 'CRN Contentful Access Token'
        required: true
      CONTENTFUL_MANAGEMENT_TOKEN:
        description: 'Contentful Management Token'
        required: true

jobs:
  sync-compliance-sheet:
    runs-on: ubuntu-latest
    environment: Branch
    container:
      image: ghcr.io/yldio/asap-hub/node-python-sq:86a189edc900d4e1afdcf3935c697292f69d409b
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Setup
        id: setup
        uses: ./.github/actions/setup-environment
        with:
          environment-name: Branch
      - name: Build
        run: |
          yarn install --immutable
          yarn exec "yarn workspaces foreach -vptR --from '{@asap-hub/model,@asap-hub/server-common,@asap-hub/crn-server}' run build:babel"
          yarn build:typecheck
      - name: Fetch Compliance Sheet ID from SSM
        run: |
          COMPLIANCE_LIVE_SHEET_ID=$(aws ssm get-parameter \
            --name "compliance-live-sheet-id" \
            --query "Parameter.Value" \
            --output text)

          echo "COMPLIANCE_LIVE_SHEET_ID=$COMPLIANCE_LIVE_SHEET_ID" >> $GITHUB_ENV
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ steps.setup.outputs.aws-default-region }}
      - name: Run Compliance Spreadsheet Sync
        run: |
          yarn workspace @asap-hub/crn-server sync:compliance-sheet
        env:
          CONTENTFUL_SPACE_ID: ${{ steps.setup.outputs.crn-contentful-space-id }}
          CONTENTFUL_ENV_ID: crn-4966
          CONTENTFUL_MANAGEMENT_ACCESS_TOKEN: ${{ secrets.CONTENTFUL_MANAGEMENT_TOKEN }}
          CONTENTFUL_ACCESS_TOKEN: ${{ secrets.CRN_CONTENTFUL_ACCESS_TOKEN }}

          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ steps.setup.outputs.aws-default-region }}

          COMPLIANCE_LIVE_SHEET_ID: ${{ env.COMPLIANCE_LIVE_SHEET_ID }}
          GOOGLE_API_CREDENTIALS_SECRET_ID: google-api-credentials-test
          ENVIRONMENT: Branch

