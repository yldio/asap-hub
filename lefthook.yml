pre-commit:
  parallel: true
  commands:
    format:
      glob: "*.{js,jsx,ts,tsx,json,html,css,scss,md,mdx,yml,yaml}"
      run: yarn prettier --write {staged_files}
      stage_fixed: true
    lint:
      glob: "*.{js,jsx,ts,tsx}"
      run: yarn eslint --fix {staged_files}
      stage_fixed: true

pre-push:
  commands:
    related-tests:
      run: |
        UPSTREAM=$(git rev-parse --verify "@{u}" 2>/dev/null \
          || git rev-parse --verify "origin/master" 2>/dev/null \
          || echo "")
        if [ -z "$UPSTREAM" ]; then
          echo "No upstream ref found — skipping related tests."
          exit 0
        fi
        FILES=$(git diff --name-only "$UPSTREAM" HEAD \
          | grep -E '\.(ts|tsx|js|jsx)$')
        if [ -z "$FILES" ]; then
          echo "No JS/TS files changed — skipping related tests."
          exit 0
        fi
        COUNT=$(echo "$FILES" | wc -l | tr -d ' ')
        if [ "$COUNT" -gt 30 ]; then
          echo "Too many files changed ($COUNT). Run 'yarn test' manually."
          exit 0
        fi
        echo "$FILES" | xargs yarn jest --findRelatedTests \
          --passWithNoTests --no-coverage
